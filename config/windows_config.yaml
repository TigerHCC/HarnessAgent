# ============================================================================
# Goose CLI configuration — WINDOWS CLIENT
# ============================================================================
# This machine runs goose; ALL models + the DTM agent live REMOTELY on GB10
# (192.168.86.44). This is the Windows counterpart of:
#   - config/goose_config.yaml  (GB10-local template, dtm uri = 127.0.0.1)
#   - config/gb10_config.yaml   (snapshot of GB10's own normalized config)
# Difference that matters on Windows:
#   - dtm `uri` uses the GB10 LAN IP (192.168.86.44), NOT 127.0.0.1
#   - memory `cmd` is the Windows goose.exe path (backslashes)
#
# ----------------------------------------------------------------------------
# WHERE TO PUT THIS FILE  (goose only reads the LIVE path, not this repo copy):
#   %APPDATA%\Block\goose\config\config.yaml
#   = C:\Users\<YOUR-USERNAME>\AppData\Roaming\Block\goose\config\config.yaml
#
# Deploy it (PowerShell, run from the HarnessAgent folder):
#   New-Item -ItemType Directory -Force -Path "$env:APPDATA\Block\goose\config" | Out-Null
#   Copy-Item .\config\windows_config.yaml "$env:APPDATA\Block\goose\config\config.yaml" -Force
#
# Adjust if your username/install differ:
#   - replace C:\Users\a9027 in the `memory.cmd` path below with your goose.exe path
#     (find it with:  (Get-Command goose).Source )
# ----------------------------------------------------------------------------
# DURABILITY: goose can silently rewrite the live config and drop the provider +
# stdio extensions -> "error: No provider configured". Keep a backup and (optionally)
# make the live file read-only:
#   Copy-Item "$env:APPDATA\Block\goose\config\config.yaml" "$env:APPDATA\Block\goose\config\config.yaml.bak" -Force
#   Set-ItemProperty "$env:APPDATA\Block\goose\config\config.yaml" -Name IsReadOnly -Value $true
#   # to edit later: Set-ItemProperty ... -Name IsReadOnly -Value $false ; edit ; set back to $true
#   # to recover:    Copy-Item ...\config.yaml.bak ...\config.yaml -Force
# ============================================================================

# ============================================================
# ACTIVE PROVIDER: vLLM (OpenAI-compatible) on GB10 :8000
# Fast (tool task ~8s, MCP ~13s); runs the larger qwen-3.6 model.
# Requires GB10 vLLM launched with:
#   --host 0.0.0.0 --port 8000 --enable-auto-tool-choice --tool-call-parser qwen3_coder
# (qwen3_coder parses Qwen's <function=...><parameter=...> XML tool format; hermes does NOT.)
# ============================================================
GOOSE_PROVIDER: openai
GOOSE_MODEL: qwen-3.6-chat
OPENAI_HOST: http://192.168.86.44:8000
OPENAI_BASE_PATH: v1/chat/completions
OPENAI_API_KEY: sk-local   # dummy; vLLM ignores it but goose requires a value

# ------------------------------------------------------------
# FALLBACK PROVIDER: Ollama on GB10 :11434 (no GB10 launch flags needed)
# To switch: set GOOSE_PROVIDER: ollama and GOOSE_MODEL: qwen3.5:9b.
# NOTE: qwen3.5:9b is the only Ollama model fast enough for tools here;
#       qwen3.6:35b STALLS on tool payloads (prompt-eval > 120s).
# ------------------------------------------------------------
# GOOSE_PROVIDER: ollama
# GOOSE_MODEL: qwen3.5:9b
OLLAMA_HOST: http://192.168.86.44:11434
OLLAMA_TIMEOUT: 900
GOOSE_STREAM_TIMEOUT: 900
OLLAMA_STREAM_TIMEOUT: 900

# --- Extensions ---
extensions:
  # Built-in shell + file editing tools.
  developer:
    type: builtin
    bundled: true
    name: developer
    enabled: true
    timeout: 300

  # Bundled 'memory' MCP server, loaded in-process as a builtin -- lower overhead
  # than spawning a separate `goose mcp memory` stdio subprocess on every run
  # (and no goose.exe path to keep correct). Same tools + same stored memories.
  memory:
    type: builtin
    bundled: true
    name: memory
    enabled: true
    timeout: 300
    description: Bundled 'memory' MCP server (builtin, in-process)

  # Computer Controller: system automation, loaded in-process as a builtin.
  # Tools: web_scrape (fetch/cache pages), automation_script (run Shell/PowerShell/
  #        Ruby/Batch), computer_control, cache, pdf_tool, docx_tool, xlsx_tool.
  # NOTE: with GOOSE_MODE=auto this lets the agent run scripts + read/write Office
  #       files on this box -- keep the web UI behind a token / 127.0.0.1.
  computercontroller:
    type: builtin
    bundled: true
    name: computercontroller
    enabled: true
    timeout: 300
    description: Computer Controller (web scrape / scripts / PDF-DOCX-XLSX) builtin

  # PersonalKnowledge DTM Knowledge Agent over MCP (mcp-proxy on GB10 :8765).
  # REMOTE client -> use the GB10 LAN IP (NOT 127.0.0.1).
  # Goose 1.39 dropped SSE: use type: streamable_http + the /mcp endpoint.
  # Tools: dtm_query, dtm_telemetry_lookup, dtm_triage, dtm_data_feature,
  #        dtm_hw_spec, dtm_health.
  # Health-check: have goose call dtm_health. A raw GET :8765/mcp returning 400 is NORMAL;
  #              never GET :8765/sse from a shell (it blocks on the event-stream).
  dtm:
    type: streamable_http
    bundled: false
    name: dtm
    enabled: true
    uri: http://192.168.86.44:8765/mcp
    headers: {}
    env_keys: []
    timeout: 600
    description: PersonalKnowledge DTM Knowledge Agent (telemetry/triage/plugin/hw-spec RAG) via streamable_http (mcp-proxy 192.168.86.44:8765)

  # Windows SRUM + live system resource usage (LOCAL elevated server on this box).
  # Server: HarnessAgent/mcp/windows_srum/ (start_srum_mcp.ps1 as admin, or install_task.ps1).
  # Tools: live_snapshot, top_processes (real-time) + srum_app_usage, srum_network_usage,
  #        srum_energy_usage, srum_health (historical per-app, needs the elevated server).
  srum:
    type: streamable_http
    bundled: false
    name: srum
    enabled: true
    uri: http://127.0.0.1:8777/mcp
    headers: {}
    env_keys: []
    timeout: 120
    description: Windows SRUM + live system resource usage (CPU/mem/net/power) via local elevated MCP server (127.0.0.1:8777)

  # Windows Event Log (LOCAL elevated server on this box).
  # Server: HarnessAgent/mcp/windows_eventlog/ (start_eventlog_mcp.ps1 as admin, or install_task.ps1).
  # Tools: list_channels, query_events, error_summary (system errors),
  #        user_activity (Security/user behavior, needs admin), get_event, eventlog_health.
  eventlog:
    type: streamable_http
    bundled: false
    name: eventlog
    enabled: true
    uri: http://127.0.0.1:8778/mcp
    headers: {}
    env_keys: []
    timeout: 120
    description: Windows Event Log (system errors + user behavior) via local elevated MCP server (127.0.0.1:8778)
