# Goose CLI configuration - generated by HarnessAgent/setup_goose.ps1
# Alienware local llama.cpp profile.
GOOSE_PROVIDER: openai
GOOSE_MODEL: qwen3.6-27b-q3ks
OPENAI_HOST: http://127.0.0.1:8000
OPENAI_BASE_PATH: v1/chat/completions
OPENAI_API_KEY: sk-local
GOOSE_CONTEXT_LIMIT: 163840
GOOSE_STREAM_TIMEOUT: 900
GOOSE_TEMPERATURE: 0.2

# Privacy: disable goose's usage telemetry. goose otherwise POSTs usage metadata
# (model, extensions, session names, token/session counts, settings) to a hosted
# PostHog endpoint (us.i.posthog.com). Keep this false so no data leaves this
# machine without approval. Your prompts/responses always stay on your provider
# (here local Ollama). See docs/install_results.md "Telemetry / privacy".
GOOSE_TELEMETRY_ENABLED: false

extensions:
  dtm:
    type: streamable_http
    bundled: false
    name: dtm
    enabled: true
    uri: http://127.0.0.1:8765/mcp
    headers: {}
    env_keys: []
    timeout: 600
    description: 'PersonalKnowledge DTM Knowledge Agent (telemetry/triage/plugin/hw-spec RAG over ChromaDB) via streamable_http (local mcp-proxy :8765)'

  pk:
    type: streamable_http
    bundled: false
    name: pk
    enabled: true
    uri: http://127.0.0.1:8766/mcp
    headers: {}
    env_keys: []
    timeout: 600
    description: 'PersonalKnowledge KB MCP (search_kb / get_document / list_sources) via streamable_http (local pk-mcp-proxy :8766)'

  developer:
    type: builtin
    bundled: true
    name: developer
    enabled: true
    timeout: 300
  memory:
    type: stdio
    bundled: false
    name: memory
    enabled: true
    cmd: C:\Users\Dell\.local\bin\goose.exe
    args:
      - mcp
      - memory
    env_keys: []
    timeout: 300
    description: Example stdio MCP extension (goose bundled 'memory' server)

  dtmsdk:
