# Goose CLI configuration
# Generated by HarnessAgent install (do NOT edit PersonalKnowledge-GB10).
# Architecture: Goose runs on Windows; models served remotely on GB10 (192.168.86.44).
# Versioned copy: HarnessAgent/config/goose_config.yaml
# Smoke-test results & rationale: HarnessAgent/docs/install_results.md
#
# IMPORTANT (durability): goose can silently rewrite the LIVE config and drop the provider +
# stdio extensions -> "error: No provider configured". The live config is therefore kept
# READ-ONLY (chmod a-w ~/.config/goose/config.yaml) with a known-good backup at
# ~/.config/goose/config.yaml.bak. To recover: cp the .bak over the live file. To edit the
# live config: chmod u+w, edit, chmod a-w. See docs/install_results.md "Re-verification".

# ============================================================
# ACTIVE PROVIDER: vLLM (OpenAI-compatible) on GB10 :8000
# Fast (tool task ~8s, MCP ~13s) and runs the larger qwen-3.6 model.
# Requires GB10 vLLM launched with:
#   --host 0.0.0.0 --port 8000 --enable-auto-tool-choice --tool-call-parser qwen3_coder
# (qwen3_coder parses Qwen's <function=...><parameter=...> XML tool format;
#  hermes does NOT work for this model.)
# ============================================================
GOOSE_PROVIDER: openai
GOOSE_MODEL: qwen-3.6-chat
OPENAI_HOST: http://192.168.86.44:8000
OPENAI_BASE_PATH: v1/chat/completions
OPENAI_API_KEY: sk-local   # dummy; vLLM ignores it but goose requires a value

# ------------------------------------------------------------
# FALLBACK PROVIDER: Ollama on GB10 :11434 (no GB10 launch flags needed)
# To switch back, set GOOSE_PROVIDER: ollama and use one of these models.
# NOTE: qwen3.5:9b is the only Ollama model fast enough for tool use here;
#       qwen3.6:35b STALLS on tool payloads (prompt-eval > 120s).
# ------------------------------------------------------------
# GOOSE_PROVIDER: ollama
# GOOSE_MODEL: qwen3.5:9b
OLLAMA_HOST: http://192.168.86.44:11434
OLLAMA_TIMEOUT: 900
GOOSE_STREAM_TIMEOUT: 900
OLLAMA_STREAM_TIMEOUT: 900

# --- Extensions ---
extensions:
  # Built-in shell + file editing tools (default).
  developer:
    type: builtin
    bundled: true
    name: developer
    enabled: true
    timeout: 300

  # Example stdio MCP extension: runs goose's bundled 'memory' MCP server
  # as an external stdio subprocess. Swap cmd/args for a real third-party
  # server later (e.g. cmd: uvx, args: [mcp-server-fetch]).
  memory:
    type: stdio
    bundled: false
    name: memory
    enabled: true
    cmd: C:\Users\a9027\.local\bin\goose.exe
    args:
      - mcp
      - memory
    env_keys: []
    timeout: 300
    description: Example stdio MCP extension (goose bundled 'memory' server) for wiring validation

  # PersonalKnowledge DTM Knowledge Agent exposed as an MCP server.
  # Transport: streamable_http via mcp-proxy on :8765 (endpoint /mcp; Goose 1.39 dropped SSE).
  # The proxy is run by the enabled SYSTEM service dtm-mcp-proxy.service
  # (/etc/systemd/system/, source PersonalKnowledge/dtm_agent/dtm-mcp-proxy.service) — so it
  # survives reboot (WantedBy=multi-user.target) and auto-restarts (Restart=on-failure).
  # Manage: systemctl status|restart dtm-mcp-proxy ; journalctl -u dtm-mcp-proxy -f
  # No-dependency fallback: set `type: stdio` + `cmd: /home/nvidia/Downloads/HarnessAgent/dtm_mcp.sh`
  #   (args: [mcp]) — Goose then spawns the agent on demand, no proxy needed.
  # Tools: dtm_query, dtm_telemetry_lookup, dtm_triage, dtm_data_feature,
  #        dtm_hw_spec, dtm_health (RAG over ChromaDB: telemetry/issues/plugins/hw-specs).
  dtm:
    type: streamable_http
    bundled: false
    name: dtm
    enabled: true
    uri: http://127.0.0.1:8765/mcp
    headers: {}
    env_keys: []
    timeout: 600
    description: PersonalKnowledge DTM Knowledge Agent (telemetry/triage/plugin/hw-spec RAG over ChromaDB) via streamable_http (mcp-proxy :8765)

  # PersonalKnowledge KB MCP -- stateless semantic retrieval (search_kb /
  # get_document / list_sources) over the pk_* ChromaDB collections. Stateless +
  # fast (first call = one embedding on vLLM :8001), so stdio is a good fit -- no
  # warm proxy needed. Enable/refresh via HarnessAgent/mcp/enable_pk_mcp.sh
  # (launcher: HarnessAgent/mcp/pk_mcp.sh). For streamable_http instead, run the
  # pk-mcp-proxy (:8766) and set type: streamable_http + uri: http://127.0.0.1:8766/mcp.
  pk:
    type: stdio
    bundled: false
    name: pk
    enabled: true
    cmd: /home/nvidia/Downloads/HarnessAgent/mcp/qb10_pk_mcp.sh
    args: []
    env_keys: []
    timeout: 600
    description: PersonalKnowledge KB MCP (search_kb / get_document / list_sources) via stdio
