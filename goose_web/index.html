<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HarnessAgent</title>
<style>
  :root{
    --bg:#0d0f14; --bg2:#11131a; --panel:#141722; --panel2:#171b27;
    --line:#242a38; --line2:#2e3545;
    --txt:#eef1f7; --muted:#9aa3b6; --faint:#6b7488;
    --accent:#d8b677; --accent2:#caa75f;   /* warm gold — used sparingly */
    --user:#1b2030; --tool:#13161f;
    --up:#5fd0a0; --down:#e0726b;
    --radius:14px; --radius-sm:10px;
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:radial-gradient(1200px 600px at 80% -10%,#171a24 0%,var(--bg) 60%);
    color:var(--txt); font-family:var(--sans);
    font-size:16.5px; line-height:1.65; letter-spacing:.1px;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    display:flex; overflow:hidden;
  }
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#2a3142;border-radius:8px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:#39425a;background-clip:content-box}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}

  /* ---------------- sidebar ---------------- */
  .nav{
    width:312px; min-width:312px; height:100vh; background:linear-gradient(180deg,var(--panel) 0%,var(--bg2) 100%);
    border-right:1px solid var(--line); display:flex; flex-direction:column; z-index:30;
  }
  .brand{padding:22px 22px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  .brand .logo{
    width:38px;height:38px;border-radius:11px;flex:0 0 auto;
    background:linear-gradient(140deg,#2a2f3d,#171a23);border:1px solid var(--line2);
    display:grid;place-items:center;color:var(--accent);font-weight:700;font-size:18px;
    box-shadow:inset 0 1px 0 #ffffff10, 0 6px 18px #0006;
  }
  .brand .name{font-size:19px;font-weight:650;letter-spacing:.3px}
  .brand .sub{font-size:12.5px;color:var(--faint);margin-top:1px}
  .navscroll{flex:1;overflow-y:auto;padding:16px 14px 20px}
  .sect{margin-bottom:22px}
  .sect>.lbl{
    font-size:11.5px;font-weight:650;letter-spacing:1.4px;text-transform:uppercase;
    color:var(--faint);padding:0 8px 9px;display:flex;align-items:center;justify-content:space-between;
  }
  .btnNew{
    width:100%;margin:2px 0 18px;padding:11px 14px;border-radius:var(--radius-sm);
    background:var(--panel2);border:1px solid var(--line2);color:var(--txt);
    font:inherit;font-size:14.5px;font-weight:550;cursor:pointer;display:flex;align-items:center;gap:9px;
    transition:.15s;
  }
  .btnNew:hover{border-color:var(--accent);color:#fff;background:#1b2030}
  .btnNew .plus{color:var(--accent);font-size:17px;line-height:1}

  /* server links */
  .srv{
    display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);
    color:var(--txt);border:1px solid transparent;transition:.14s;margin-bottom:2px;
  }
  .srv:hover{background:var(--panel2);border-color:var(--line2);text-decoration:none}
  .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;background:var(--faint)}
  .dot.up{background:var(--up)}
  .dot.down{background:var(--down)}
  .dot.checking{background:var(--accent);animation:pulse 1.4s ease-in-out infinite}
  .srv .dot{box-shadow:0 0 0 3px #0003}
  .srv .dot.up{box-shadow:0 0 0 3px #0003,0 0 9px #5fd0a070}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .srv .meta{min-width:0;flex:1}
  .srv .nm{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .srv .host{font-size:11.5px;color:var(--faint);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .srv .ext{color:var(--muted);font-size:11px;flex:0 0 auto}
  .srv .open{color:var(--faint);font-size:13px;flex:0 0 auto;opacity:0;transition:.14s}
  .srv:hover .open{opacity:1;color:var(--accent)}

  /* an MCP server (extension) -> a card listing its tools (function name + description) */
  .extn{margin:8px 0;border:1px solid var(--line);border-radius:12px;background:#ffffff04;overflow:hidden}
  .extn-head{display:flex;gap:9px;padding:10px 12px;cursor:pointer;user-select:none;align-items:flex-start}
  .extn-head:hover{background:#ffffff06}
  .extn-chev{color:var(--faint);font-size:10px;transition:.2s;margin-top:4px;flex:0 0 auto}
  .extn.collapsed .extn-chev{transform:rotate(-90deg)}
  .extn.collapsed .extn-tools{display:none}
  .extn-head .dot{margin-top:5px}
  .extn-main{flex:1;min-width:0}
  .extn-top{display:flex;align-items:baseline;gap:8px}
  .extn-name{font-weight:650;font-size:14.5px;color:#fff;letter-spacing:.2px}
  .extn-cnt{margin-left:auto;font-size:11px;color:var(--faint);white-space:nowrap}
  .extn-meta{font-size:10.5px;color:var(--faint);font-family:var(--mono);margin-top:3px;letter-spacing:.3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;gap:6px;align-items:center}
  .extn-meta a{color:var(--accent);flex:0 0 auto;text-decoration:none}
  .extn-tools{border-top:1px solid var(--line);padding:3px 0}
  .extn-empty{padding:9px 14px 9px 28px;font-size:11.5px;color:var(--faint);font-style:italic}
  .extn.ext-off{opacity:.5}
  .dot.off{background:#9993}
  .extn-sw{position:relative;width:34px;height:18px;flex:0 0 auto;margin-left:8px}
  .extn-sw input{position:absolute;inset:0;opacity:0;margin:0;cursor:pointer;z-index:1}
  .extn-sw .sl{position:absolute;inset:0;border-radius:999px;background:#8884;transition:.15s}
  .extn-sw .sl::before{content:"";position:absolute;left:2px;top:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:.15s}
  .extn-sw input:checked+.sl{background:var(--accent)}
  .extn-sw input:checked+.sl::before{transform:translateX(16px)}
  /* one tool = one callable function: NAME (mono, accent) over its description */
  .tl{padding:8px 12px 8px 28px;position:relative}
  .tl:hover{background:#ffffff05}
  .tl::before{content:"";position:absolute;left:16px;top:7px;bottom:7px;width:2px;border-radius:2px;background:var(--line2)}
  .tl:hover::before{background:var(--accent)}
  .tl-name{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);word-break:break-word}
  .tl-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-top:3px}

  .sess{padding:9px 11px;border-radius:var(--radius-sm);cursor:pointer;color:var(--muted);font-size:14px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid transparent;transition:.13s}
  .sess:hover{background:var(--panel2);color:var(--txt)}
  .sess.active{background:#1b2030;color:#fff;border-color:var(--line2)}
  .sess .pre{color:var(--accent);margin-right:7px}

  .navfoot{padding:13px 20px;border-top:1px solid var(--line);font-size:12px;color:var(--faint);
    display:flex;align-items:center;justify-content:space-between;gap:10px}

  /* ---------------- main ---------------- */
  .main{flex:1;height:100vh;display:flex;flex-direction:column;min-width:0}
  .top{height:60px;flex:0 0 auto;border-bottom:1px solid var(--line);display:flex;align-items:center;
    gap:14px;padding:0 22px;background:#0f1119cc;backdrop-filter:blur(8px)}
  .top .menu{display:none;background:none;border:0;color:var(--txt);font-size:22px;cursor:pointer}
  .top .title{font-size:16px;font-weight:550;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .modeToggle{display:flex;background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:3px}
  .modeToggle button{background:none;border:0;color:var(--muted);font:inherit;font-size:13px;font-weight:550;
    padding:6px 13px;border-radius:7px;cursor:pointer;transition:.14s}
  .modeToggle button.on{background:var(--accent);color:#231c0c}
  .pill{font-size:12px;color:var(--muted);font-family:var(--mono);padding:5px 11px;border:1px solid var(--line2);border-radius:20px}

  .transcript{flex:1;overflow-y:auto;scroll-behavior:smooth}
  .wrap{max-width:860px;margin:0 auto;padding:30px 26px 48px}

  .hero{text-align:center;padding:11vh 10px 0;color:var(--muted)}
  .hero .mark{
    width:74px;height:74px;border-radius:20px;margin:0 auto 22px;
    background:linear-gradient(140deg,#2a2f3d,#15181f);border:1px solid var(--line2);
    display:grid;place-items:center;color:var(--accent);font-size:34px;font-weight:700;
    box-shadow:inset 0 1px 0 #ffffff12, 0 14px 40px #0008;
  }
  .hero h1{font-size:31px;font-weight:600;color:#fff;letter-spacing:.3px;margin:0 0 8px}
  .hero p{font-size:15.5px;margin:0 auto;max-width:560px}
  .chips{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:30px}
  .chip{background:var(--panel);border:1px solid var(--line2);border-radius:13px;padding:14px 16px;max-width:250px;
    text-align:left;cursor:pointer;color:var(--muted);font:inherit;font-size:13.5px;line-height:1.5;transition:.15s}
  .chip:hover{border-color:var(--accent);color:var(--txt);transform:translateY(-2px);box-shadow:0 10px 30px #0006}
  .chip b{color:var(--accent2);display:block;font-size:12px;letter-spacing:.4px;margin-bottom:5px;font-family:var(--mono)}

  .msg{display:flex;gap:15px;margin:26px 0}
  .msg .av{width:34px;height:34px;border-radius:10px;flex:0 0 auto;display:grid;place-items:center;
    font-size:12px;font-weight:650;letter-spacing:.3px}
  .msg.user .av{background:#283150;color:#bcd0ff}
  .msg.assistant .av{background:linear-gradient(140deg,#2a2f3d,#171a23);border:1px solid var(--line2);color:var(--accent)}
  .msg .body{min-width:0;flex:1;padding-top:3px}
  .msg .who{font-size:12.5px;color:var(--faint);font-weight:600;letter-spacing:.4px;margin-bottom:4px}
  .msg.user .utext{background:var(--user);border:1px solid var(--line2);border-radius:13px;padding:11px 15px;
    white-space:pre-wrap;word-break:break-word;font-size:16px}

  /* markdown */
  .md{font-size:16px;line-height:1.72;word-break:break-word}
  .md>*:first-child{margin-top:0}
  .md>*:last-child{margin-bottom:0}
  .md h1,.md h2,.md h3,.md h4{color:#fff;font-weight:640;line-height:1.3;margin:1.3em 0 .55em;letter-spacing:.2px}
  .md h1{font-size:1.5em;border-bottom:1px solid var(--line);padding-bottom:.3em}
  .md h2{font-size:1.3em}
  .md h3{font-size:1.13em}
  .md h4{font-size:1em;color:var(--muted)}
  .md p{margin:.7em 0}
  .md ul,.md ol{margin:.6em 0;padding-left:1.5em}
  .md li{margin:.3em 0}
  .md li::marker{color:var(--accent)}
  .md a{border-bottom:1px solid #d8b67740}
  .md strong{color:#fff;font-weight:640}
  .md em{color:#f3e9d6}
  .md del{color:var(--faint)}
  .md code{font-family:var(--mono);font-size:.88em;background:#ffffff0d;color:#ecd9b3;padding:2px 6px;border-radius:6px}
  .md pre{background:#0b0d12;border:1px solid var(--line);border-radius:12px;padding:15px 17px;overflow-x:auto;margin:1em 0;line-height:1.55}
  .md pre code{background:none;color:#dfe5ef;padding:0;font-size:13.5px}
  .md blockquote{margin:1em 0;padding:.4em 1em;border-left:3px solid var(--accent);background:#ffffff06;border-radius:0 8px 8px 0;color:var(--muted)}
  .md hr{border:0;border-top:1px solid var(--line);margin:1.4em 0}
  .md table{border-collapse:collapse;margin:1em 0;width:100%;font-size:14.5px;display:block;overflow-x:auto}
  .md th,.md td{border:1px solid var(--line2);padding:8px 13px;text-align:left}
  .md th{background:#ffffff08;color:#fff;font-weight:600}
  .md tr:nth-child(even) td{background:#ffffff04}
  .cursor{display:inline-block;width:8px;height:1.05em;background:var(--accent);margin-left:2px;border-radius:2px;
    vertical-align:text-bottom;animation:blink 1s steps(2) infinite}
  @keyframes blink{50%{opacity:0}}

  /* tool cards */
  .tcard{background:var(--tool);border:1px solid var(--line2);border-radius:12px;margin:14px 0;overflow:hidden}
  .tcard .head{display:flex;align-items:center;gap:10px;padding:11px 15px;cursor:pointer;font-size:14px}
  .tcard .head:hover{background:#ffffff05}
  .tcard .chev{color:var(--faint);transition:.2s;font-size:12px}
  .tcard.collapsed .chev{transform:rotate(-90deg)}
  .tcard.collapsed .args{display:none}
  .tcard .tn{font-family:var(--mono);font-size:13.5px;color:var(--accent2);font-weight:600}
  .tcard .extb{font-size:11px;color:var(--faint);background:#ffffff0a;padding:2px 8px;border-radius:20px}
  .tcard .spin{margin-left:auto;font-size:12px;color:var(--faint)}
  .tcard.done .spin{color:var(--up)}
  .tcard .args{font-family:var(--mono);font-size:12.5px;color:var(--muted);padding:0 15px 13px;white-space:pre-wrap;word-break:break-word;line-height:1.55}
  .errline{color:var(--down);background:#e0726b12;border:1px solid #e0726b30;border-radius:10px;padding:10px 14px;margin:12px 0;font-size:14.5px}

  /* composer */
  .composer{flex:0 0 auto;padding:14px 26px 22px;border-top:1px solid var(--line);background:#0f1119}
  .cbox{max-width:860px;margin:0 auto;background:var(--panel);border:1px solid var(--line2);border-radius:16px;
    padding:8px 8px 8px 18px;display:flex;align-items:flex-end;gap:10px;transition:.15s}
  .cbox:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px #d8b67718}
  .cbox textarea{flex:1;background:none;border:0;outline:0;color:var(--txt);font:inherit;font-size:16px;
    resize:none;max-height:200px;line-height:1.55;padding:9px 0}
  .cbox textarea::placeholder{color:var(--faint)}
  .cbox .attachbtn{background:none;border:0;color:var(--faint);cursor:pointer;font-size:18px;padding:0 2px 9px;align-self:flex-end;line-height:1}
  .cbox .attachbtn:hover{color:var(--accent)}
  /* composer file-attach chips (scoped to #chips so they don't clobber the hero .chip cards) */
  #chips{max-width:860px;margin:0 auto 8px;display:flex;flex-wrap:wrap;gap:7px}
  #chips:empty{display:none}
  #chips .chip{display:flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--line2);
    border-radius:9px;padding:4px 9px;font-size:12.5px;color:var(--txt);max-width:240px;cursor:default;transform:none;box-shadow:none}
  #chips .chip:hover{transform:none;box-shadow:none;border-color:var(--line2)}
  #chips .chip .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #chips .chip .sz{color:var(--faint);font-size:11px;flex:0 0 auto}
  #chips .chip .x{cursor:pointer;color:var(--faint);flex:0 0 auto;font-size:13px}
  #chips .chip .x:hover{color:var(--down)}
  .composer.drag .cbox{border-color:var(--accent);box-shadow:0 0 0 4px #d8b67730}
  .ufiles{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px}
  .ufile{font-size:12px;color:var(--muted);background:var(--tool);border:1px solid var(--line);border-radius:7px;padding:2px 8px}
  .send{width:40px;height:40px;border-radius:11px;border:0;background:var(--accent);color:#231c0c;
    font-size:18px;cursor:pointer;flex:0 0 auto;transition:.15s;display:grid;place-items:center}
  .send:hover{background:#e6c585}
  .send:disabled{background:#39425a;color:#0008;cursor:default}
  .chint{max-width:860px;margin:8px auto 0;font-size:11.5px;color:var(--faint);text-align:center}
  .working .send{opacity:.6}

  .scrim{display:none}
  @media(max-width:820px){
    .nav{position:fixed;left:0;top:0;transform:translateX(-100%);transition:.25s;box-shadow:0 0 60px #000a}
    body.navopen .nav{transform:none}
    body.navopen .scrim{display:block;position:fixed;inset:0;background:#0008;z-index:20}
    .top .menu{display:block}
    .wrap{padding:24px 16px 40px}
  }
</style>
</head>
<body>
  <aside class="nav" id="nav">
    <div class="brand">
      <div class="logo">H</div>
      <div>
        <div class="name">HarnessAgent</div>
        <div class="sub" id="brandSub">local agent · GB10</div>
      </div>
    </div>
    <div class="navscroll">
      <button class="btnNew" id="btnNew"><span class="plus">+</span> New chat</button>

      <div class="sect">
        <div class="lbl">Servers</div>
        <div id="servers"></div>
      </div>

      <div class="sect">
        <div class="lbl">MCP servers &amp; tools</div>
        <div id="tools"></div>
      </div>

      <div class="sect" id="sessSect">
        <div class="lbl">Chats</div>
        <div id="sessions"></div>
      </div>
    </div>
    <div class="navfoot">
      <span id="footModel">—</span>
      <span id="footVer">—</span>
    </div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <main class="main">
    <div class="top">
      <button class="menu" id="btnMenu">≡</button>
      <div class="title" id="topTitle">New chat</div>
      <div class="modeToggle" id="modeToggle">
        <button data-mode="auto" class="on">Agent</button>
        <button data-mode="chat">Chat</button>
      </div>
      <span class="pill" id="pillModel">—</span>
    </div>
    <div class="transcript" id="transcript"><div class="wrap" id="wrap"></div></div>
    <div class="composer" id="composer">
      <div class="chips" id="chips"></div>
      <div class="cbox">
        <button class="attachbtn" id="btnAttach" title="Attach files">📎</button>
        <textarea id="input" rows="1" placeholder="Send a message…  (Enter to send, Shift+Enter for newline)"></textarea>
        <button class="send" id="btnSend" title="Send">↑</button>
      </div>
      <input type="file" id="fileInput" multiple style="display:none">
      <div class="chint" id="hint">Agent mode runs tools (shell, files, knowledge) · Chat mode is model-only · 📎 attach files for the agent to read</div>
    </div>
  </main>

<script>
/* ---------------- helpers ---------------- */
const $=s=>document.querySelector(s);
function el(c,cls){const e=document.createElement(c);if(cls)e.className=cls;return e;}
function esc(s){return (s==null?"":String(s)).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}
function hostOf(u){try{return new URL(u).host;}catch(_){return (u||"").replace(/^https?:\/\//,"");}}

/* ---------------- markdown (self-contained, escapes first) ---------------- */
function mdInline(s){
  // operates on ALREADY-escaped text
  return s
    .replace(/`([^`]+)`/g,(m,c)=>"<code>"+c+"</code>")
    .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
    .replace(/(^|[^*])\*([^*\n]+)\*/g,"$1<em>$2</em>")
    .replace(/__([^_]+)__/g,"<strong>$1</strong>")
    .replace(/~~([^~]+)~~/g,"<del>$1</del>")
    .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/(^|[\s(])((https?:\/\/)[^\s<)]+)/g,'$1<a href="$2" target="_blank" rel="noopener">$2</a>');
}
function isTableSep(l){return /^\s*\|?[\s:?-]*-[-\s:|]*\|?\s*$/.test(l)&&l.includes("-");}
function mdToHtml(src){
  const lines=String(src).replace(/\r/g,"").split("\n");
  const out=[];let i=0;
  while(i<lines.length){
    let l=lines[i];
    // fenced code
    const fence=l.match(/^\s*```(\w*)/);
    if(fence){
      const buf=[];i++;
      while(i<lines.length && !/^\s*```/.test(lines[i])){buf.push(lines[i]);i++;}
      i++; out.push("<pre><code>"+esc(buf.join("\n"))+"</code></pre>");continue;
    }
    let h=l.match(/^(#{1,6})\s+(.*)$/);
    if(h){const n=h[1].length;out.push("<h"+n+">"+mdInline(esc(h[2].trim()))+"</h"+n+">");i++;continue;}
    if(/^\s*([-*_])\s*\1\s*\1[\s\1]*$/.test(l)){out.push("<hr>");i++;continue;}
    if(/^\s*>\s?/.test(l)){
      const buf=[];
      while(i<lines.length && /^\s*>\s?/.test(lines[i])){buf.push(lines[i].replace(/^\s*>\s?/,""));i++;}
      out.push("<blockquote>"+mdToHtml(buf.join("\n"))+"</blockquote>");continue;
    }
    // table
    if(l.includes("|") && i+1<lines.length && isTableSep(lines[i+1])){
      const cells=r=>r.replace(/^\s*\|/,"").replace(/\|\s*$/,"").split("|").map(c=>c.trim());
      const head=cells(l);i+=2;const rows=[];
      while(i<lines.length && lines[i].includes("|") && lines[i].trim()!==""){rows.push(cells(lines[i]));i++;}
      let t="<table><thead><tr>"+head.map(c=>"<th>"+mdInline(esc(c))+"</th>").join("")+"</tr></thead><tbody>";
      t+=rows.map(r=>"<tr>"+r.map(c=>"<td>"+mdInline(esc(c))+"</td>").join("")+"</tr>").join("");
      out.push(t+"</tbody></table>");continue;
    }
    // lists
    if(/^\s*([-*+]|\d+\.)\s+/.test(l)){
      const ordered=/^\s*\d+\.\s+/.test(l);const buf=[];
      while(i<lines.length && /^\s*([-*+]|\d+\.)\s+/.test(lines[i])){
        buf.push(lines[i].replace(/^\s*([-*+]|\d+\.)\s+/,""));i++;
      }
      out.push((ordered?"<ol>":"<ul>")+buf.map(b=>"<li>"+mdInline(esc(b))+"</li>").join("")+(ordered?"</ol>":"</ul>"));continue;
    }
    if(l.trim()===""){i++;continue;}
    const buf=[];
    while(i<lines.length && lines[i].trim()!=="" && !/^\s*(#{1,6}\s|```|>\s?|([-*+]|\d+\.)\s)/.test(lines[i])
          && !(lines[i].includes("|")&&i+1<lines.length&&isTableSep(lines[i+1]))){
      buf.push(lines[i]);i++;
    }
    out.push("<p>"+mdInline(esc(buf.join("\n"))).replace(/\n/g,"<br>")+"</p>");
  }
  return out.join("");
}

/* ---------------- state ---------------- */
let HEALTH=null, MODE="auto", TOKEN=localStorage.getItem("haToken")||"";
const transcript=$("#transcript"), wrap=$("#wrap"), input=$("#input");
const sessions=[]; let active=null, streaming=false;
function modelLabel(){return (HEALTH&&HEALTH.model)||"assistant";}
function newId(){return "web-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,6);}

function renderSessions(){
  const box=$("#sessions");box.innerHTML="";
  sessions.forEach(s=>{
    const d=el("div","sess"+(s.id===active?" active":""));d.title=s.id;
    d.innerHTML='<span class="pre">›</span>'+esc(s.title||"New chat");
    d.onclick=()=>switchTo(s.id);box.appendChild(d);
  });
}
function curSession(){return sessions.find(s=>s.id===active);}

function showHero(){
  wrap.innerHTML="";
  const h=el("div","hero");
  h.innerHTML='<div class="mark">H</div><h1>How can I help?</h1>'+
    '<p>'+esc(modelLabel())+' on GB10 · agent tools, knowledge base &amp; system telemetry</p><div class="chips" id="heroChips"></div>';
  wrap.appendChild(h);
  const chips=[
    ["knowledge","Search the knowledge base for SSD wear and NVMe SMART health"],
    ["telemetry","Which telemetry datatypes cover battery health and charge cycles?"],
    ["triage","A laptop runs hot and the battery drains fast — triage it"],
    ["developer","Create hello.txt in the workspace with today's date"],
  ];
  const cw=$("#heroChips");
  chips.forEach(([tag,text])=>{
    const c=el("button","chip");c.innerHTML="<b>"+tag+"</b>"+esc(text);
    c.onclick=()=>{input.value=text;input.focus();autoGrow();};cw.appendChild(c);
  });
}
function newChat(){
  const id=newId();sessions.unshift({id,title:"",html:""});active=id;
  $("#topTitle").textContent="New chat";renderSessions();showHero();closeNav();input.focus();
}
function switchTo(id){
  const cur=curSession();if(cur)cur.html=wrap.innerHTML;
  active=id;const s=curSession();wrap.innerHTML=s.html||"";if(!s.html)showHero();
  $("#topTitle").textContent=s.title||"New chat";renderSessions();closeNav();
}

/* ---------------- message rendering ---------------- */
function addUser(text,files){
  if(wrap.querySelector(".hero"))wrap.innerHTML="";
  const m=el("div","msg user");
  m.innerHTML='<div class="av">YOU</div><div class="body"><div class="utext"></div></div>';
  m.querySelector(".utext").textContent=text;
  if(files&&files.length){const fl=el("div","ufiles");fl.innerHTML=files.map(n=>'<span class="ufile">📎 '+esc(n)+'</span>').join("");m.querySelector(".body").appendChild(fl);}
  wrap.appendChild(m);scrollDown();
}
let A=null;
function startAssistant(){
  const m=el("div","msg assistant");
  m.innerHTML='<div class="av">AI</div><div class="body"><div class="who">'+esc(modelLabel())+'</div></div>';
  wrap.appendChild(m);
  A={content:m.querySelector(".body"),curText:null,buf:"",lastTool:null,cursor:true};scrollDown();
}
function ensureText(){if(!A.curText){A.curText=el("div","md");A.content.appendChild(A.curText);A.buf="";}}
function renderText(){ensureText();A.curText.innerHTML=mdToHtml(A.buf)+(A.cursor?'<span class="cursor"></span>':"");}
function onText(t){ensureText();A.buf+=t;renderText();scrollDown();}
function onToolStart(name,ext){
  A.curText=null;
  const card=el("div","tcard");
  card.innerHTML='<div class="head"><span class="chev">▾</span><span class="tn">'+esc(name)+'</span>'+
    (ext?'<span class="extb">'+esc(ext)+'</span>':'')+'<span class="spin">running…</span></div><div class="args"></div>';
  card.querySelector(".head").onclick=()=>card.classList.toggle("collapsed");
  A.content.appendChild(card);A.lastTool=card;scrollDown();
}
function onToolArgs(text){
  if(!A.lastTool)return;
  A.lastTool.querySelector(".args").textContent=text;
  const sp=A.lastTool.querySelector(".spin");sp.textContent="done";A.lastTool.classList.add("done");
}
function finishAssistant(){
  if(A){A.cursor=false;if(A.curText)renderText();
    if(A.lastTool){const sp=A.lastTool.querySelector(".spin");if(sp.textContent==="running…"){sp.textContent="done";A.lastTool.classList.add("done");}}}
  A=null;
}
function addError(text){
  const e=el("div","errline");e.textContent="⚠ "+text;(A?A.content:wrap).appendChild(e);scrollDown();
}
function scrollDown(){transcript.scrollTop=transcript.scrollHeight;}

/* ---------------- send / stream ---------------- */
async function send(){
  const text=input.value.trim();
  const files=pending.slice();
  if((!text&&files.length===0)||streaming)return;
  if(!active)newChat();
  const s=curSession();
  if(!s.title){s.title=(text||files.map(f=>f.name).join(", ")).slice(0,46);$("#topTitle").textContent=s.title;renderSessions();}
  addUser(text,files.map(f=>f.name));input.value="";pending=[];renderChips();autoGrow();
  streaming=true;setWorking(true);startAssistant();
  try{
    const attachments=[];
    for(const f of files){
      const uh={};if(TOKEN)uh["X-Goose-Token"]=TOKEN;
      const ur=await fetch("/api/upload?session="+encodeURIComponent(active)+"&name="+encodeURIComponent(f.name),{method:"POST",headers:uh,body:f});
      if(ur.status===401){TOKEN="";localStorage.removeItem("haToken");promptToken();throw new Error("unauthorized — token required");}
      if(!ur.ok)throw new Error("upload failed: "+f.name+" ("+ur.status+")");
      attachments.push((await ur.json()).name);
    }
    const headers={"Content-Type":"application/json"};if(TOKEN)headers["X-Goose-Token"]=TOKEN;
    const res=await fetch("/api/chat",{method:"POST",headers,body:JSON.stringify({session:active,message:text,mode:MODE,attachments})});
    if(res.status===401){TOKEN="";localStorage.removeItem("haToken");promptToken();throw new Error("unauthorized — token required");}
    if(!res.ok)throw new Error("server error "+res.status);
    const reader=res.body.getReader(),dec=new TextDecoder();let buf="";
    while(true){
      const {value,done}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});let nl;
      while((nl=buf.indexOf("\n"))>=0){
        const line=buf.slice(0,nl);buf=buf.slice(nl+1);
        if(!line.trim())continue;
        let ev;try{ev=JSON.parse(line);}catch(_){continue;}
        if(ev.type==="text")onText(ev.text);
        else if(ev.type==="tool_start")onToolStart(ev.name,ev.ext);
        else if(ev.type==="tool_args")onToolArgs(ev.text);
        else if(ev.type==="error")addError(ev.text);
      }
    }
  }catch(err){addError(err.message||String(err));}
  finally{finishAssistant();streaming=false;setWorking(false);const cur=curSession();if(cur)cur.html=wrap.innerHTML;}
}
function setWorking(on){document.body.classList.toggle("working",on);$("#btnSend").disabled=on;}

/* ---------------- health / sidebar ---------------- */
async function loadHealth(){
  try{const r=await fetch("/api/health");HEALTH=await r.json();}
  catch(_){HEALTH={model:modelLabel(),backends:[],extensions:[],tools:[]};}
  $("#pillModel").textContent=HEALTH.model||"—";
  $("#footModel").textContent=HEALTH.model||"—";
  $("#footVer").textContent=HEALTH.version?("core "+HEALTH.version):"—";
  try{$("#brandSub").textContent="local agent · "+(HEALTH.provider?hostOf(HEALTH.provider.split("@").pop().trim()):"GB10");}catch(_){}

  // servers (clickable links)
  const sv=$("#servers");sv.innerHTML="";
  (HEALTH.backends||[]).forEach(b=>{
    const a=el("a","srv");a.href=b.detail||"#";a.target="_blank";a.rel="noopener";
    a.innerHTML='<span class="dot '+(b.ok?"up":"down")+'"></span><span class="meta"><div class="nm">'+esc(b.name)+
      '</div><div class="host">'+esc(hostOf(b.detail))+'</div></span><span class="open">↗</span>';
    sv.appendChild(a);
  });

  // ---- MCP servers (extensions) -> each card lists its tools (function name + description) ----
  const tw=$("#tools");tw.innerHTML="";
  const tools=HEALTH.tools||[], exts=HEALTH.extensions||[];
  const shown=new Set();
  function metaText(tp,detail){
    if(tp==="builtin")return "builtin";
    const host=detail?String(detail).replace(/^https?:\/\//,""):"";
    if(tp==="streamable_http")return "MCP · http"+(host?" · "+host:"");
    if(tp==="stdio")return "MCP · stdio";
    return tp?("MCP · "+tp):"MCP";
  }
  function renderExt(id,name,transport,status,detail,myTools,enabled,togglable){
    const card=el("div","extn");
    if(togglable && enabled===false)card.classList.add("ext-off");
    if(localStorage.getItem("haCol:"+id)==="1")card.classList.add("collapsed");
    const st=status==="ok"?"up":(status==="disabled"?"off":(status==="error"||status==="down"?"down":"checking"));
    const cnt=myTools.length?(myTools.length+(myTools.length>1?" tools":" tool")):(status==="checking"?"…":"—");
    const httpUrl=(transport==="streamable_http"&&detail)?("http://"+String(detail).replace(/^https?:\/\//,"")):null;
    const head=el("div","extn-head");
    head.innerHTML='<span class="extn-chev">▾</span><span class="dot '+st+'"></span>'+
      '<div class="extn-main"><div class="extn-top"><span class="extn-name">'+esc(name||id)+'</span>'+
      '<span class="extn-cnt">'+cnt+'</span></div>'+
      '<div class="extn-meta"><span>'+esc(metaText(transport,detail))+'</span>'+
      (httpUrl?'<a href="'+esc(httpUrl)+'" target="_blank" rel="noopener" title="open server">↗</a>':'')+'</div></div>';
    const link=head.querySelector("a");if(link)link.onclick=e=>e.stopPropagation();
    head.onclick=()=>{const c=card.classList.toggle("collapsed");localStorage.setItem("haCol:"+id,c?"1":"0");};
    card.appendChild(head);
    const body=el("div","extn-tools");
    if(myTools.length){
      myTools.forEach(t=>{
        const d=el("div","tl");
        d.innerHTML='<div class="tl-name">'+esc(t.name)+'</div>'+(t.desc?'<div class="tl-desc">'+esc(t.desc)+'</div>':'');
        body.appendChild(d);
      });
    }else{
      const e=el("div","extn-empty");e.textContent=status==="disabled"?"disabled":(status==="checking"?"discovering tools…":"no tools exposed");body.appendChild(e);
    }
    if(togglable){
      const top=head.querySelector(".extn-top");
      const sw=el("label","extn-sw");
      sw.title="enable / disable this MCP for the agent (applies to your next message)";
      sw.innerHTML='<input type="checkbox"'+(enabled?" checked":"")+'><span class="sl"></span>';
      const cb=sw.querySelector("input");
      sw.onclick=e=>e.stopPropagation();          // clicking the switch must not collapse the card
      cb.onchange=()=>postToggle(id,cb.checked,card,cb);
      top.appendChild(sw);
    }
    card.appendChild(body);tw.appendChild(card);
  }
  exts.forEach(x=>{
    if(x.transport==="platform")return;               // goose internal platform extensions — not user tools
    const myTools=tools.filter(t=>t.group===x.id);
    if(myTools.length===0 && x.status!=="checking" && !x.togglable)return;
    shown.add(x.id);
    renderExt(x.id,x.name,x.transport,x.status,x.detail,myTools,x.enabled,x.togglable);
  });
  // tool groups with no matching extension entry (fallback)
  [...new Set(tools.filter(t=>!shown.has(t.group)).map(t=>t.group))].forEach(g=>{
    renderExt(g,g,"",null,null,tools.filter(t=>t.group===g),true,false);
  });

  if(HEALTH.token_required && !TOKEN)promptToken();
}
function promptToken(){
  const v=prompt("This agent requires an access token:","");
  if(v){TOKEN=v.trim();localStorage.setItem("haToken",TOKEN);}
}
async function postToggle(id,enabled,card,cb){
  if(cb)cb.disabled=true;                               // block double-clicks while the POST is in flight
  if(card)card.classList.toggle("ext-off",!enabled);   // optimistic
  const headers={"Content-Type":"application/json"};if(TOKEN)headers["X-Goose-Token"]=TOKEN;
  try{
    const r=await fetch("/api/extensions/toggle",{method:"POST",headers,body:JSON.stringify({id,enabled})});
    if(r.status===401){TOKEN="";localStorage.removeItem("haToken");promptToken();throw new Error("token required");}
    if(!r.ok){let j={};try{j=await r.json();}catch(_){}throw new Error(j.error||("error "+r.status));}
    setTimeout(loadHealth,1200);                        // reconcile with the refreshed snapshot
  }catch(err){
    if(cb)cb.checked=!enabled;                          // revert switch
    if(card)card.classList.toggle("ext-off",enabled);   // revert style
    alert("toggle failed: "+(err.message||err));
  }finally{
    if(cb)cb.disabled=false;                            // re-enable (harmless if the node was replaced by a re-render)
  }
}

/* ---------------- ui plumbing ---------------- */
function autoGrow(){input.style.height="auto";input.style.height=Math.min(input.scrollHeight,200)+"px";}
function openNav(){document.body.classList.add("navopen");}
function closeNav(){document.body.classList.remove("navopen");}
input.addEventListener("input",autoGrow);
input.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});

/* ---------------- file attach ---------------- */
let pending=[];
function fmtSize(n){const u=["B","KB","MB","GB"];let f=n,i=0;while(f>=1024&&i<3){f/=1024;i++;}return (i?f.toFixed(1):f)+" "+u[i];}
function renderChips(){
  const box=$("#chips");box.innerHTML="";
  pending.forEach((f,idx)=>{
    const c=el("div","chip");
    c.innerHTML='<span class="nm">'+esc(f.name)+'</span><span class="sz">'+fmtSize(f.size)+'</span><span class="x" title="remove">✕</span>';
    c.querySelector(".x").onclick=()=>{pending.splice(idx,1);renderChips();};
    box.appendChild(c);
  });
}
function addFiles(list){for(const f of list){if(f)pending.push(f);}renderChips();}
$("#btnAttach").onclick=()=>$("#fileInput").click();
$("#fileInput").addEventListener("change",e=>{addFiles(e.target.files);e.target.value="";});
const composerEl=$("#composer");
["dragenter","dragover"].forEach(ev=>composerEl.addEventListener(ev,e=>{e.preventDefault();composerEl.classList.add("drag");}));
["dragleave","drop"].forEach(ev=>composerEl.addEventListener(ev,e=>{e.preventDefault();if(ev==="drop"||!composerEl.contains(e.relatedTarget))composerEl.classList.remove("drag");}));
composerEl.addEventListener("drop",e=>{if(e.dataTransfer&&e.dataTransfer.files)addFiles(e.dataTransfer.files);});
input.addEventListener("paste",e=>{const fs=[...((e.clipboardData&&e.clipboardData.files)?e.clipboardData.files:[])];if(fs.length){e.preventDefault();addFiles(fs);}});

$("#btnSend").onclick=send;
$("#btnNew").onclick=newChat;
$("#btnMenu").onclick=openNav;$("#scrim").onclick=closeNav;
$("#modeToggle").addEventListener("click",e=>{
  const btn=e.target.closest("button");if(!btn)return;
  MODE=btn.dataset.mode;
  [...$("#modeToggle").children].forEach(c=>c.classList.toggle("on",c===btn));
});

loadHealth();newChat();
setInterval(loadHealth,20000);
</script>
