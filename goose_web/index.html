<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Goose Harness</title>
<style>
  :root{
    --ink:#0E1116; --panel:#13181F; --panel2:#1A212B; --line:#222A35;
    --text:#D8DFE8; --muted:#8B96A4; --faint:#59636F;
    --amber:#E8A33D; --amber-soft:rgba(232,163,61,.13); --amber-line:rgba(232,163,61,.34);
    --teal:#5BC8C0; --red:#E5664E;
    --user:#19222E;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"JetBrains Mono","SF Mono","Cascadia Code",Menlo,Consolas,monospace;
    --r:10px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:var(--ink); color:var(--text);
    font-family:var(--sans); font-size:14px; line-height:1.6;
    display:grid; grid-template-columns:264px 1fr; height:100vh; overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------------- sidebar ---------------- */
  .side{
    background:var(--panel); border-right:1px solid var(--line);
    display:flex; flex-direction:column; min-height:0;
  }
  .brand{padding:18px 18px 14px; border-bottom:1px solid var(--line)}
  .mascot{font-family:var(--mono); color:var(--amber); font-size:15px; letter-spacing:.5px; white-space:pre}
  .wordmark{font-family:var(--mono); font-weight:700; letter-spacing:3px; font-size:17px; margin-top:6px}
  .wordmark b{color:var(--amber); font-weight:700}
  .subline{color:var(--faint); font-size:11px; letter-spacing:2.5px; text-transform:uppercase; margin-top:2px}

  .modelchip{
    margin:14px 16px 4px; padding:9px 11px; background:var(--panel2);
    border:1px solid var(--line); border-radius:var(--r); font-family:var(--mono); font-size:12px;
    display:flex; align-items:center; gap:8px;
  }
  .modelchip .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 7px var(--teal);flex:0 0 auto}
  .modelchip .m{color:var(--text); font-weight:600}
  .modelchip .h{color:var(--faint); font-size:11px}

  .side .scroll{overflow-y:auto; flex:1 1 auto; min-height:0; padding:8px 0 12px}
  .seclabel{color:var(--faint); font-size:10.5px; letter-spacing:1.8px; text-transform:uppercase; padding:14px 18px 6px}

  .backend{display:flex; align-items:center; gap:9px; padding:5px 18px; font-size:12.5px}
  .backend .d{width:7px;height:7px;border-radius:50%;background:var(--faint);flex:0 0 auto;transition:.3s}
  .backend.up .d{background:var(--teal);box-shadow:0 0 6px var(--teal)}
  .backend.down .d{background:var(--red)}
  .backend .n{color:var(--text)} .backend .u{color:var(--faint); font-family:var(--mono); font-size:11px; margin-left:auto}

  .toolgrp{padding:7px 18px 2px; color:var(--amber); font-family:var(--mono); font-size:11px; letter-spacing:.5px; opacity:.85}
  .tool{padding:3px 18px 3px 28px; font-size:12.5px; color:var(--muted); cursor:default}
  .tool code{font-family:var(--mono); color:var(--text); font-size:12px}
  .tool .t{color:var(--faint); font-size:11px}

  .newchat{margin:12px 16px 4px; display:flex; gap:8px}
  .newchat button{
    flex:1; background:var(--amber-soft); color:var(--amber); border:1px solid var(--amber-line);
    border-radius:var(--r); padding:9px; font-family:var(--mono); font-size:12.5px; cursor:pointer; transition:.15s;
  }
  .newchat button:hover{background:rgba(232,163,61,.2)}
  .sessions{padding:2px 0 6px}
  .sess{padding:7px 18px; font-size:13px; color:var(--muted); cursor:pointer; border-left:2px solid transparent; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .sess:hover{background:var(--panel2); color:var(--text)}
  .sess.active{color:var(--text); border-left-color:var(--amber); background:var(--panel2)}
  .sess .pre{font-family:var(--mono); color:var(--faint); margin-right:6px}

  .side .foot{border-top:1px solid var(--line); padding:10px 18px; font-size:11px; color:var(--faint); font-family:var(--mono)}

  /* ---------------- main ---------------- */
  .main{display:flex; flex-direction:column; min-width:0; min-height:0; background:var(--ink)}
  .topbar{
    height:52px; border-bottom:1px solid var(--line); display:flex; align-items:center;
    gap:12px; padding:0 20px; flex:0 0 auto;
  }
  .menu{display:none; background:none;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:6px 9px;cursor:pointer;font-family:var(--mono)}
  .topbar .title{font-weight:600; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .topbar .spacer{flex:1}
  .working{display:none; align-items:center; gap:9px; color:var(--amber); font-family:var(--mono); font-size:12.5px}
  .working.on{display:flex}
  .working .swim{position:relative; width:64px; height:14px; overflow:hidden; color:var(--amber)}
  .working .swim::before{content:"__( o)>"; position:absolute; left:0; animation:swim 1.5s linear infinite; white-space:pre}
  @keyframes swim{0%{transform:translateX(-6px)}50%{transform:translateX(6px)}100%{transform:translateX(-6px)}}

  .transcript{flex:1 1 auto; overflow-y:auto; min-height:0; padding:24px 20px 8px}
  .wrap{max-width:824px; margin:0 auto}

  /* empty / hero */
  .hero{max-width:680px; margin:7vh auto 0; text-align:center}
  .hero .big{font-family:var(--mono); color:var(--amber); font-size:30px; white-space:pre; line-height:1.25}
  .hero h1{font-size:20px; margin:18px 0 4px; font-weight:650}
  .hero p{color:var(--muted); margin:0 0 22px}
  .chips{display:flex; flex-wrap:wrap; gap:9px; justify-content:center}
  .chip{
    background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:8px 14px;
    font-size:12.5px; color:var(--muted); cursor:pointer; transition:.15s; text-align:left;
  }
  .chip:hover{border-color:var(--amber-line); color:var(--text)}
  .chip b{color:var(--amber); font-family:var(--mono); font-weight:600; font-size:11.5px; letter-spacing:.3px}

  /* messages */
  .msg{display:flex; gap:13px; margin:0 0 22px; align-items:flex-start}
  .av{flex:0 0 auto; width:26px; height:26px; border-radius:7px; display:grid; place-items:center; font-family:var(--mono); font-size:12px; margin-top:1px}
  .msg.user .av{background:var(--user); color:var(--muted); border:1px solid var(--line)}
  .msg.assistant .av{background:var(--amber-soft); color:var(--amber); border:1px solid var(--amber-line)}
  .body{min-width:0; flex:1}
  .msg.user .body{color:var(--text)}
  .msg.user .utext{background:var(--user); border:1px solid var(--line); border-radius:var(--r); padding:9px 13px; white-space:pre-wrap; overflow-wrap:anywhere}
  .who{font-size:11px; color:var(--faint); font-family:var(--mono); letter-spacing:.5px; margin-bottom:5px}

  /* tool cards */
  .tcard{border:1px solid var(--line); border-radius:var(--r); margin:10px 0; background:var(--panel); overflow:hidden}
  .tcard .head{
    display:flex; align-items:center; gap:9px; padding:8px 12px; cursor:pointer; font-family:var(--mono); font-size:12.5px;
    user-select:none;
  }
  .tcard .chev{color:var(--amber); transition:transform .15s; flex:0 0 auto}
  .tcard.collapsed .chev{transform:rotate(-90deg)}
  .tcard .tn{color:var(--text); font-weight:600}
  .tcard .ext{color:var(--ink); background:var(--amber); border-radius:5px; padding:0 6px; font-size:10.5px; letter-spacing:.4px}
  .tcard .spin{margin-left:auto; color:var(--faint); font-size:11px}
  .tcard .args{border-top:1px solid var(--line); padding:9px 12px; font-family:var(--mono); font-size:12px; color:var(--muted); white-space:pre-wrap; overflow-x:auto}
  .tcard.collapsed .args{display:none}
  .tcard.done .spin{color:var(--teal)}

  /* markdown */
  .md{overflow-wrap:anywhere}
  .md p{margin:.5em 0}
  .md h1,.md h2,.md h3,.md h4{margin:1em 0 .4em; line-height:1.3; font-weight:650}
  .md h1{font-size:1.35em} .md h2{font-size:1.2em} .md h3{font-size:1.06em} .md h4{font-size:1em}
  .md a{color:var(--amber); text-decoration:none; border-bottom:1px solid var(--amber-line)}
  .md code{font-family:var(--mono); background:var(--panel2); border:1px solid var(--line); border-radius:5px; padding:1px 5px; font-size:.88em}
  .md pre{background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:12px 14px; overflow-x:auto; margin:.7em 0}
  .md pre code{background:none; border:none; padding:0; font-size:12.5px; line-height:1.55}
  .md ul,.md ol{margin:.5em 0; padding-left:1.4em}
  .md li{margin:.18em 0}
  .md blockquote{border-left:3px solid var(--amber-line); margin:.6em 0; padding:.1em 0 .1em 14px; color:var(--muted)}
  .md hr{border:none; border-top:1px solid var(--line); margin:1em 0}
  .md table{border-collapse:collapse; margin:.7em 0; font-size:13px; display:block; overflow-x:auto}
  .md th,.md td{border:1px solid var(--line); padding:6px 11px; text-align:left}
  .md th{background:var(--panel2); color:var(--text); font-weight:600}
  .md tr:nth-child(even) td{background:rgba(255,255,255,.012)}
  .md .cursor{display:inline-block; width:7px; height:15px; background:var(--amber); margin-left:2px; vertical-align:-2px; animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}
  .errline{color:var(--red); font-family:var(--mono); font-size:12.5px; border:1px solid rgba(229,102,78,.4); background:rgba(229,102,78,.08); border-radius:var(--r); padding:8px 12px; margin:8px 0}

  /* composer */
  .composer{flex:0 0 auto; border-top:1px solid var(--line); padding:14px 20px 18px; background:var(--ink)}
  .cwrap{max-width:824px; margin:0 auto}
  .crow{display:flex; gap:10px; align-items:flex-end; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:8px 8px 8px 14px; transition:border-color .15s}
  .crow:focus-within{border-color:var(--amber-line)}
  textarea{
    flex:1; background:none; border:none; color:var(--text); font-family:var(--sans); font-size:14px;
    resize:none; outline:none; max-height:180px; line-height:1.5; padding:6px 0;
  }
  .send{
    background:var(--amber); color:#1a1206; border:none; border-radius:10px; width:38px; height:38px; cursor:pointer;
    font-size:16px; flex:0 0 auto; transition:.15s; display:grid; place-items:center;
  }
  .send:hover{filter:brightness(1.08)} .send:disabled{opacity:.4; cursor:default}
  .cmeta{display:flex; align-items:center; gap:14px; margin-top:9px; color:var(--faint); font-size:11.5px; flex-wrap:wrap}
  .toggle{display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; font-family:var(--mono); font-size:11.5px}
  .toggle button{background:none; border:none; color:var(--muted); padding:4px 11px; cursor:pointer}
  .toggle button.on{background:var(--amber-soft); color:var(--amber)}
  .cmeta .hint{margin-left:auto; font-family:var(--mono)}
  .cmeta kbd{font-family:var(--mono); background:var(--panel2); border:1px solid var(--line); border-radius:4px; padding:0 4px}

  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#27313d; border-radius:6px; border:2px solid var(--ink)}
  ::-webkit-scrollbar-track{background:transparent}
  :focus-visible{outline:2px solid var(--amber); outline-offset:2px}

  .scrim{display:none}
  @media (max-width:860px){
    body{grid-template-columns:1fr}
    .side{position:fixed; z-index:30; width:282px; height:100%; transform:translateX(-100%); transition:transform .2s}
    body.nav .side{transform:none}
    .scrim{display:block; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:20; opacity:0; pointer-events:none; transition:.2s}
    body.nav .scrim{opacity:1; pointer-events:auto}
    .menu{display:block}
  }
  @media (prefers-reduced-motion:reduce){
    .working .swim::before{animation:none}
    .md .cursor{animation:none}
  }
</style>
</head>
<body>
  <aside class="side" id="side">
    <div class="brand">
      <div class="mascot">__( o)&gt;</div>
      <div class="wordmark"><b>GOOSE</b> HARNESS</div>
      <div class="subline">on-prem agent · GB10</div>
    </div>
    <div class="modelchip" title="active model">
      <span class="dot"></span>
      <span class="m" id="mModel">qwen-3.6-chat</span>
      <span class="h" id="mHost">GB10</span>
    </div>
    <div class="scroll">
      <div class="newchat"><button id="btnNew">+ New chat</button></div>
      <div class="sessions" id="sessions"></div>

      <div class="seclabel">Backends</div>
      <div id="backends"></div>

      <div class="seclabel">Tools</div>
      <div id="tools"></div>
    </div>
    <div class="foot" id="foot">goose —</div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <main class="main">
    <div class="topbar">
      <button class="menu" id="btnMenu" aria-label="menu">≡</button>
      <div class="title" id="topTitle">New chat</div>
      <div class="spacer"></div>
      <div class="working" id="working"><div class="swim"></div><span>working…</span></div>
    </div>

    <div class="transcript" id="transcript">
      <div class="wrap" id="wrap"></div>
    </div>

    <div class="composer">
      <div class="cwrap">
        <div class="crow">
          <textarea id="input" rows="1" placeholder="Ask the harness, or invoke a tool — e.g. “Use dtm_triage: laptop runs hot and battery drains”"></textarea>
          <button class="send" id="btnSend" title="Send (Enter)">↑</button>
        </div>
        <div class="cmeta">
          <span>mode</span>
          <span class="toggle" id="modeToggle">
            <button data-mode="auto" class="on">Auto · tools</button>
            <button data-mode="chat">Chat only</button>
          </span>
          <span class="hint"><kbd>Enter</kbd> send · <kbd>Shift</kbd>+<kbd>Enter</kbd> newline</span>
        </div>
      </div>
    </div>
  </main>

<script>
"use strict";
const $ = (s, r=document) => r.querySelector(s);
const el = (t, c) => { const e=document.createElement(t); if(c) e.className=c; return e; };
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

/* ---------------- minimal markdown (headings, lists, tables, code, inline) ---------------- */
function mdInline(s){
  // s is already HTML-escaped. Protect inline code, then format.
  const codes=[];
  s = s.replace(/`([^`]+)`/g, (_,c)=>{ codes.push(c); return "␀"+(codes.length-1)+"␀"; });
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>");
  s = s.replace(/(^|[\s(])_([^_]+)_/g, "$1<em>$2</em>");
  s = s.replace(/␀(\d+)␀/g, (_,i)=>"<code>"+codes[+i]+"</code>");
  return s;
}
function mdToHtml(src){
  const lines = src.replace(/\r/g,"").split("\n");
  let out=[], i=0;
  const isTableSep = l => /^\s*\|?\s*:?-{2,}:?\s*(\|\s*:?-{2,}:?\s*)+\|?\s*$/.test(l);
  while(i<lines.length){
    let l = lines[i];
    if(/^\s*```/.test(l)){                              // fenced code
      const lang=(l.replace(/^\s*```/,"").trim()); i++; let buf=[];
      while(i<lines.length && !/^\s*```/.test(lines[i])){ buf.push(lines[i]); i++; }
      i++; out.push("<pre><code>"+esc(buf.join("\n"))+"</code></pre>"); continue;
    }
    if(/^\s*#{1,6}\s/.test(l)){                          // heading
      const m=l.match(/^\s*(#{1,6})\s+(.*)$/); const n=m[1].length;
      out.push("<h"+n+">"+mdInline(esc(m[2]))+"</h"+n+">"); i++; continue;
    }
    if(/^\s*(---|\*\*\*|___)\s*$/.test(l)){ out.push("<hr>"); i++; continue; }
    if(l.includes("|") && i+1<lines.length && isTableSep(lines[i+1])){   // table
      const head=l.trim().replace(/^\||\|$/g,"").split("|").map(c=>c.trim());
      i+=2; const rows=[];
      while(i<lines.length && lines[i].includes("|") && lines[i].trim()!==""){
        rows.push(lines[i].trim().replace(/^\||\|$/g,"").split("|").map(c=>c.trim())); i++;
      }
      let t="<table><thead><tr>"+head.map(c=>"<th>"+mdInline(esc(c))+"</th>").join("")+"</tr></thead><tbody>";
      for(const r of rows){ t+="<tr>"+head.map((_,k)=>"<td>"+mdInline(esc(r[k]||""))+"</td>").join("")+"</tr>"; }
      out.push(t+"</tbody></table>"); continue;
    }
    if(/^\s*>\s?/.test(l)){                              // blockquote
      let buf=[]; while(i<lines.length && /^\s*>\s?/.test(lines[i])){ buf.push(lines[i].replace(/^\s*>\s?/,"")); i++; }
      out.push("<blockquote>"+mdInline(esc(buf.join(" ")))+"</blockquote>"); continue;
    }
    if(/^\s*([-*+]|\d+\.)\s+/.test(l)){                  // list
      const ordered=/^\s*\d+\.\s+/.test(l); let buf=[];
      while(i<lines.length && /^\s*([-*+]|\d+\.)\s+/.test(lines[i])){
        buf.push(lines[i].replace(/^\s*([-*+]|\d+\.)\s+/,"")); i++;
      }
      out.push((ordered?"<ol>":"<ul>")+buf.map(b=>"<li>"+mdInline(esc(b))+"</li>").join("")+(ordered?"</ol>":"</ul>")); continue;
    }
    if(l.trim()===""){ i++; continue; }                 // blank
    let buf=[];                                          // paragraph
    while(i<lines.length && lines[i].trim()!=="" && !/^\s*(#{1,6}\s|```|>\s?|([-*+]|\d+\.)\s)/.test(lines[i]) && !(lines[i].includes("|")&&i+1<lines.length&&isTableSep(lines[i+1]))){
      buf.push(lines[i]); i++;
    }
    out.push("<p>"+mdInline(esc(buf.join("\n"))).replace(/\n/g,"<br>")+"</p>");
  }
  return out.join("");
}

/* ---------------- state ---------------- */
let HEALTH=null, MODE="auto", TOKEN=localStorage.getItem("gooseToken")||"";
const transcript=$("#transcript"), wrap=$("#wrap"), input=$("#input");
const sessions=[];           // {id,title,html}
let active=null, streaming=false;

function newId(){ return "web-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,6); }

function renderSessions(){
  const box=$("#sessions"); box.innerHTML="";
  sessions.forEach(s=>{
    const d=el("div","sess"+(s.id===active?" active":"")); d.title=s.id;
    d.innerHTML='<span class="pre">›</span>'+esc(s.title||"New chat");
    d.onclick=()=>switchTo(s.id); box.appendChild(d);
  });
}
function curSession(){ return sessions.find(s=>s.id===active); }

function showHero(){
  wrap.innerHTML="";
  const h=el("div","hero");
  h.innerHTML='<div class="big">  __( o)&gt;\n \\____)   </div>'+
    '<h1>Goose is ready</h1><p>Local agent · '+esc((HEALTH&&HEALTH.model)||"qwen-3.6-chat")+
    ' on GB10 · developer + memory + DTM knowledge tools</p><div class="chips" id="heroChips"></div>';
  wrap.appendChild(h);
  const chips=[
    ["dtm_triage","Customer laptop runs hot and the battery drains fast — triage it"],
    ["dtm_telemetry_lookup","Which telemetry datatypes cover SSD wear and NVMe SMART health?"],
    ["dtm_hw_spec","Look up SMBIOS Type 17 memory device fields"],
    ["developer","Create hello.txt in the workspace with the current date"],
  ];
  const cw=$("#heroChips");
  chips.forEach(([tag,text])=>{
    const c=el("button","chip"); c.innerHTML="<b>"+tag+"</b><br>"+esc(text);
    c.onclick=()=>{ input.value=text; input.focus(); autoGrow(); }; cw.appendChild(c);
  });
}

function newChat(){
  const id=newId(); sessions.unshift({id,title:"",html:""}); active=id;
  $("#topTitle").textContent="New chat"; renderSessions(); showHero();
  closeNav(); input.focus();
}
function switchTo(id){
  const cur=curSession(); if(cur) cur.html=wrap.innerHTML;
  active=id; const s=curSession();
  wrap.innerHTML = s.html || "";
  if(!s.html) showHero();
  $("#topTitle").textContent = s.title || "New chat";
  renderSessions(); closeNav();
}

/* ---------------- message rendering ---------------- */
function addUser(text){
  if(wrap.querySelector(".hero")) wrap.innerHTML="";
  const m=el("div","msg user"); m.innerHTML='<div class="av">you</div><div class="body"><div class="utext"></div></div>';
  m.querySelector(".utext").textContent=text; wrap.appendChild(m); scrollDown();
}
let A=null; // active assistant render state
function startAssistant(){
  const m=el("div","msg assistant");
  m.innerHTML='<div class="av">&gt;_</div><div class="body"><div class="who">goose</div></div>';
  wrap.appendChild(m);
  A={ content:m.querySelector(".body"), curText:null, buf:"", lastTool:null, cursor:true };
  scrollDown();
}
function ensureText(){
  if(!A.curText){ A.curText=el("div","md"); A.content.appendChild(A.curText); A.buf=""; }
}
function renderText(){
  ensureText();
  A.curText.innerHTML = mdToHtml(A.buf) + (A.cursor ? '<span class="cursor"></span>' : "");
}
function onText(t){ ensureText(); A.buf += t; renderText(); scrollDown(); }
function onToolStart(name,ext){
  A.curText=null;                       // subsequent text starts a fresh segment after the card
  const card=el("div","tcard");
  card.innerHTML='<div class="head"><span class="chev">▾</span><span class="tn">'+esc(name)+'</span>'+
    (ext?'<span class="ext">'+esc(ext)+'</span>':'')+'<span class="spin">running…</span></div>'+
    '<div class="args"></div>';
  card.querySelector(".head").onclick=()=>card.classList.toggle("collapsed");
  A.content.appendChild(card); A.lastTool=card; scrollDown();
}
function onToolArgs(text){
  if(!A.lastTool) return;
  A.lastTool.querySelector(".args").textContent=text;
  const sp=A.lastTool.querySelector(".spin"); sp.textContent="done"; A.lastTool.classList.add("done");
}
function finishAssistant(){
  if(A){ A.cursor=false; if(A.curText) renderText();
    if(A.lastTool){ const sp=A.lastTool.querySelector(".spin"); if(sp.textContent==="running…"){sp.textContent="done"; A.lastTool.classList.add("done");} }
  }
  A=null;
}
function addError(text){
  ensureText && (A&&ensureText());
  const e=el("div","errline"); e.textContent="⚠ "+text;
  (A?A.content:wrap).appendChild(e); scrollDown();
}
function scrollDown(){ transcript.scrollTop=transcript.scrollHeight; }

/* ---------------- send / stream ---------------- */
async function send(){
  const text=input.value.trim();
  if(!text || streaming) return;
  if(!active) newChat();
  const s=curSession();
  if(!s.title){ s.title=text.slice(0,42); $("#topTitle").textContent=s.title; renderSessions(); }

  addUser(text); input.value=""; autoGrow();
  streaming=true; setWorking(true); startAssistant();

  try{
    const headers={"Content-Type":"application/json"};
    if(TOKEN) headers["X-Goose-Token"]=TOKEN;
    const res=await fetch("/api/chat",{method:"POST",headers,
      body:JSON.stringify({session:active,message:text,mode:MODE})});
    if(res.status===401){ TOKEN=""; localStorage.removeItem("gooseToken"); promptToken(); throw new Error("unauthorized — token required"); }
    if(!res.ok){ throw new Error("server error "+res.status); }
    const reader=res.body.getReader(), dec=new TextDecoder(); let buf="";
    while(true){
      const {value,done}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true}); let nl;
      while((nl=buf.indexOf("\n"))>=0){
        const line=buf.slice(0,nl); buf=buf.slice(nl+1);
        if(!line.trim()) continue;
        let ev; try{ ev=JSON.parse(line); }catch(_){ continue; }
        if(ev.type==="text") onText(ev.text);
        else if(ev.type==="tool_start") onToolStart(ev.name,ev.ext);
        else if(ev.type==="tool_args") onToolArgs(ev.text);
        else if(ev.type==="error") addError(ev.text);
        else if(ev.type==="done"){ /* handled after loop */ }
      }
    }
  }catch(err){ addError(err.message||String(err)); }
  finally{
    finishAssistant(); streaming=false; setWorking(false);
    const cur=curSession(); if(cur) cur.html=wrap.innerHTML;
  }
}
function setWorking(on){ $("#working").classList.toggle("on",on); $("#btnSend").disabled=on; }

/* ---------------- health / sidebar ---------------- */
async function loadHealth(){
  try{
    const r=await fetch("/api/health"); HEALTH=await r.json();
  }catch(_){ HEALTH={model:"qwen-3.6-chat",backends:[],tools:[]}; }
  $("#mModel").textContent=HEALTH.model||"qwen-3.6-chat";
  try{ $("#mHost").textContent=new URL(HEALTH.provider?HEALTH.provider.split("@").pop().trim():"http://gb10").host||"GB10"; }catch(_){ $("#mHost").textContent="GB10"; }
  $("#foot").textContent="goose "+(HEALTH.version||"—");
  // backends
  const b=$("#backends"); b.innerHTML="";
  (HEALTH.backends||[]).forEach(x=>{
    const d=el("div","backend "+(x.ok?"up":"down"));
    d.innerHTML='<span class="d"></span><span class="n">'+esc(x.name)+'</span><span class="u">'+esc((x.detail||"").replace(/^https?:\/\//,""))+'</span>';
    b.appendChild(d);
  });
  // tools grouped
  const t=$("#tools"); t.innerHTML=""; let grp=null;
  (HEALTH.tools||[]).forEach(x=>{
    if(x.group!==grp){ grp=x.group; const g=el("div","toolgrp"); g.textContent=grp; t.appendChild(g); }
    const d=el("div","tool"); d.innerHTML='<code>'+esc(x.name)+'</code> <span class="t">— '+esc(x.desc)+'</span>'; t.appendChild(d);
  });
  if(HEALTH.token_required && !TOKEN) promptToken();
}
function promptToken(){
  const v=prompt("This Goose harness requires an access token (GOOSE_WEB_TOKEN):","");
  if(v){ TOKEN=v.trim(); localStorage.setItem("gooseToken",TOKEN); }
}

/* ---------------- ui plumbing ---------------- */
function autoGrow(){ input.style.height="auto"; input.style.height=Math.min(input.scrollHeight,180)+"px"; }
function openNav(){ document.body.classList.add("nav"); }
function closeNav(){ document.body.classList.remove("nav"); }

input.addEventListener("input",autoGrow);
input.addEventListener("keydown",e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); }});
$("#btnSend").onclick=send;
$("#btnNew").onclick=newChat;
$("#btnMenu").onclick=openNav; $("#scrim").onclick=closeNav;
$("#modeToggle").addEventListener("click",e=>{
  const btn=e.target.closest("button"); if(!btn) return;
  MODE=btn.dataset.mode;
  [...$("#modeToggle").children].forEach(c=>c.classList.toggle("on",c===btn));
});

loadHealth(); newChat();
setInterval(loadHealth, 20000);   // refresh backend status
</script>
</body>
